name: KRYV Bluesky Marketing

on:
  schedule:
    - cron: '0 */4 * * *' # Har 4 ghante mein chalega (Daily Posts)
  workflow_dispatch: # Manual button in GitHub Actions tab

jobs:
  marketing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm install @atproto/api
        
      - name: Execute Marketing Script
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/bluesky-auto.mjs
