name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"] # Ya "master", jo bhi tera main branch hai
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: kryv-core # ⚠️ YAHAN TERA CLOUDFLARE PROJECT NAME LIKH (Check Dashboard)
          directory: out # Next.js export folder
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
